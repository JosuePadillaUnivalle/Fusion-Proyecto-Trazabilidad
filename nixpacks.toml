# Nixpacks detecta extensiones PHP desde composer.json (ext-gd, ext-pdo_pgsql, etc.).
# Ver: https://nixpacks.com/docs/providers/php

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "chmod +x railway-start.sh",
  "php -m | grep -i '^gd$' || echo 'AVISO BUILD: ext-gd no cargada; revise composer.json ext-gd'",
]

[start]
cmd = "bash railway-start.sh"
