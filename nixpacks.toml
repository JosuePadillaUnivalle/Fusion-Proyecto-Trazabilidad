[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_pgsql", "php84Extensions.pdo_sqlite", "php84Extensions.zip", "php84Extensions.mbstring", "php84Extensions.bcmath", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.gd", "php84Extensions.tokenizer"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "chmod +x railway-start.sh"
]

[start]
cmd = "bash railway-start.sh"
